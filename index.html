<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&family=DM+Sans:opsz,wght@9..40,300..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Weather app</title>
  </head>
  <body>
    <main>
      <header class="site-header">
        <a href="#" class="logo">
          <img
            class="icon"
            src="./assets/images/logo.svg"
            alt="Weather App Logo"
          />
        </a>
        <button
          class="units-toggle"
          aria-label="Units selection"
          aria-expanded="false"
        >
          <img
            src="./assets/images/icon-units.svg"
            alt=""
            class="icon"
            aria-hidden="true"
          />
          <span>Units</span>
          <img
            src="./assets/images/icon-dropdown.svg"
            alt=""
            class="arrow"
            aria-hidden="true"
          />
        </button>
        <nav class="units-menu" aria-label="Units menu" hidden>
          <button class="changeUnits">Switch to Imperial</button>
          <fieldset>
            <legend>Temperature</legend>
            <label>
              <input type="radio" name="temperature" value="celsius" checked />
              Celsius (°C)
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
            <label>
              <input type="radio" name="temperature" value="fahrenheit" />
              Fahrenheit (°F)
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
          </fieldset>
          <fieldset>
            <legend>Wind Speed</legend>
            <label>
              <input type="radio" name="wind-speed" value="kmh" checked />
              km/h
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
            <label>
              <input type="radio" name="wind-speed" value="mph" />
              mph
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
          </fieldset>
          <fieldset>
            <legend>Precipitation</legend>
            <label>
              <input type="radio" name="precipitation" value="mm" checked />
              Millimeters (mm)
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
            <label>
              <input type="radio" name="precipitation" value="inch" />
              Inch (in)
              <img src="./assets/images/icon-checkmark.svg" alt="" />
            </label>
          </fieldset>
        </nav>
      </header>
      <section class="hero" aria-labelledby="hero-heading">
        <h1 id="hero-heading">How's the sky looking today?</h1>
        <form class="search-form" action="#" method="get">
          <label class="input-group" for="location-search">
            <img
              src="./assets/images/icon-search.svg"
              alt="Search icon"
              class="icon"
            />
            <input
              id="location-search"
              class="search-input"
              name="location"
              type="search"
              autocomplete="off"
              placeholder="Search for a place..."
            />
          </label>
          <ul class="suggestions hidden">
            <li>City Name</li>
            <li>City Name</li>
            <li>City Name</li>
            <li>City Name</li>
          </ul>
          <button class="search-button" type="submit">Search</button>
        </form>
      </section>
      <div class="error" hidden>
        <p class="error-message">No search result found!</p>
      </div>
      <div class="weather-container" hidden>
        <section class="weather-summary">
          <div class="current-weather">
            <div class="loading" hidden>
              <div class="loading-dots">
                <span>•</span>
                <span>•</span>
                <span>•</span>
              </div>
              <p>Loading...</p>
            </div>
            <div class="current-weather-details">
              <h2 class="country">&nbsp;</h2>
              <p class="date"></p>
            </div>
            <div class="temp">
              <img src="" alt="" />
              <span class="value"></span>
            </div>
          </div>
          <div class="weather-metrics">
            <dl class="metric apparent-temp">
              <dt>Feels Like</dt>
              <dd>-</dd>
            </dl>
            <dl class="metric humidity">
              <dt>Humidity</dt>
              <dd>-</dd>
            </dl>
            <dl class="metric wind-speed">
              <dt>Wind Speed</dt>
              <dd>-</dd>
            </dl>
            <dl class="metric precipitation">
              <dt>Precipitation</dt>
              <dd>-</dd>
            </dl>
          </div>
          <section
            class="daily-forecast"
            aria-labelledby="daily-forecast-heading"
          >
            <h2 id="daily-forecast-heading">Daily Forecast</h2>
            <ul class="forecast-list">
              <li class="day"></li>
              <li class="day"></li>
              <li class="day"></li>
              <li class="day"></li>
              <li class="day"></li>
              <li class="day"></li>
              <li class="day"></li>
            </ul>
          </section>
        </section>
        <section
          class="hourly-forecast"
          aria-labelledby="hourly-forecast-heading"
        >
          <nav aria-label="Hourly forecast navigation">
            <h2 id="hourly-forecast-heading">Hourly Forecast</h2>
            <button
              class="days-toggle"
              aria-label="Days selection"
              aria-expanded="false"
            >
              <span>-</span>
              <img
                src="./assets/images/icon-dropdown.svg"
                alt=""
                aria-hidden="true"
              />
            </button>
            <ul class="days-menu" hidden>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
              <li><button type="button"></button></li>
            </ul>
          </nav>
          <ul class="hourly-list">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
          </ul>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
